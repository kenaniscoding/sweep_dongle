# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # # 1. The Dongle (Acts as Central)
  # - board: nice_nano_v2
  #   shield: sweep_dongle
  #
  # # 2. Left Half (Now a Peripheral)
  # - board: nice_nano_v2
  #   shield: sweep_left
  #   cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  #
  # # 3. Right Half (Remains a Peripheral)
  # - board: nice_nano_v2
  #   shield: sweep_right
  # sweep
  - board: seeeduino_xiao_ble
    shield: sweep_central_dongle dongle_display
    artifact-name: sweep_central_dongle
  - board: nice_nano_v2
    shield: sweep_central_left led_indicator
    artifact-name: sweep_central_left
  - board: nice_nano_v2
    shield: sweep_peripheral_left led_indicator
    artifact-name: sweep_peripheral_left
  - board: nice_nano_v2
    shield: sweep_peripheral_right led_indicator
    artifact-name: sweep_peripheral_right
  - board: nice_nano_v2
    shield: sweep_central_left led_indicator
    snippet: zmk-usb-logging
    artifact-name: sweep_central_left_with_logging
